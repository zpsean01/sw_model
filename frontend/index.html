<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARM Firmware Analysis Dashboard</title>
<!-- ZTree CSS -->
<link rel="stylesheet" href="js/lib/ztree/zTreeStyle.css">
<!-- Custom styles -->
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <!-- Header -->
  <header id="header">
    <h1>FW Analyzer</h1>
    <span class="subtitle">ARM Firmware Analysis</span>
  </header>

  <div id="main">
    <!-- Left: zTree panel -->
    <aside id="tree-panel">
      <div class="tree-title">Navigation</div>
      <ul id="ztree" class="ztree"></ul>
    </aside>

    <!-- Right: content panel -->
    <section id="editor-panel">
      <div id="jsoneditor"></div>
      <div id="unified-page" style="display:none">
        <div class="unified-col" id="stats-col">
          <div class="col-header">Statistics</div>
          <div id="stats-content"></div>
        </div>
        <div class="unified-col" id="gojs-col">
          <div class="col-header">Graph</div>
          <div id="gojs-diagram"></div>
        </div>
        <div class="unified-col" id="json-col">
          <div class="col-header">JSON</div>
          <div id="unified-jsoneditor"></div>
        </div>
      </div>
      <div id="protocol-page" style="display:none">
        <div class="unified-col" id="pc-stats-col">
          <div class="col-header">Findings Overview</div>
          <div id="pc-stats-content"></div>
        </div>
        <div class="unified-col" id="pc-gojs-col">
          <div class="col-header">Affected Functions</div>
          <div id="pc-gojs-diagram"></div>
        </div>
        <div class="unified-col" id="pc-detail-col">
          <div class="col-header">Finding Details</div>
          <div id="pc-detail-content"></div>
        </div>
      </div>
    </section>
  </div>
</div>

<!-- GoJS -->
<script src="js/lib/gojs.min.js"></script>

<!-- Ace Editor (JSON viewer) -->
<script src="js/lib/ace.min.js"></script>
<script src="js/lib/ace-mode-json.min.js"></script>
<script src="js/lib/ace-theme-chrome.min.js"></script>
<script src="js/lib/ace-ext-searchbox.min.js"></script>

<!-- Third-party libraries -->
<script src="js/lib/jquery.min.js"></script>
<script src="js/lib/ztree/jquery.ztree.all.min.js"></script>

<!-- Application scripts -->
<script src="js/common/api.js"></script>
<script src="js/common/ztree-common.js"></script>
<script src="js/common/json-editor.js"></script>
<script src="js/common/gojs-common.js"></script>
<script src="js/common/gojs_topo.js"></script>
<script src="js/common/components.js"></script>
<script src="js/features/app.js"></script>
</body>
</html>
